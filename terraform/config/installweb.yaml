#cloud-config
package_update: true
package_upgrade: true

packages:
  - nginx

write_files:
  - path: /var/www/html/index.html
    content: |
      <html>
        <head>
          <title>Welcome to Nginx!</title>
        </head>
        <body>
          <h1>Hello from VMSS Instance: $(hostname)</h1>
          <p>Server: $(hostname -I)</p>
        </body>
      </html>

runcmd:
  - systemctl enable nginx
  - systemctl start nginx